<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Arshia Libu Portfolio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Header / Personal Info -->
  <section id="personal-info" class="section neon-outline">
    <h1>Arshia Libu</h1>
    <p>Roll No: 25BCYC16</p>
    <p>Kristu Jayanti University</p>
  </section>

  <!-- Education Section -->
  <section id="education" class="section neon-outline">
    <h2>Education</h2>
    <p>High School: India International School</p>
    <p>University: Kristu Jayanti University</p>
  </section>

  <!-- Skills Section -->
  <section id="skills" class="section neon-outline">
    <h2>Skills</h2>
    <div class="skill-item">Python</div>
    <div class="skill-item">C</div>
    <div class="skill-item">RDBMS</div>
    <div class="skill-item">Digital Engineering</div>
  </section>

  <!-- Contact Section -->
  <section id="contact" class="section neon-outline">
    <h2>Contact Me</h2>
    <form id="contact-form">
      <input type="text" id="name" placeholder="Name" required><br>
      <input type="email" id="email" placeholder="Email" required><br>
      <textarea id="message" placeholder="Message" required></textarea><br>
      <button type="submit">Send Message</button>
    </form>
  </section>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- Custom JS -->
  <script src="script.js" defer></script>

</body>
</html>
